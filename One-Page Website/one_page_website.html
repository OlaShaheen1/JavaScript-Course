<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ola Shaheen - Portfolio</title>
    <style>
        :root { 
            --primary-color: #6a4c93; 
            --bg-color: #f3eff5; 
            --overlay-bg: rgba(0, 0, 0, 0.9);
        }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; color: #333; line-height: 1.6; }
        
        nav { background-color: var(--primary-color); padding: 15px; position: sticky; top: 0; text-align: center; z-index: 100; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        nav a:hover { text-decoration: underline; }
        
        section { padding: 60px 20px; max-width: 800px; margin: auto; }
        #home, #video { background-color: white; }
        #pictures, #contact { background-color: var(--bg-color); }
        
        /* Gallery Styles */
        #pictures img { 
            max-width: 100%; 
            height: auto; 
            border-radius: 8px; 
            margin: 10px 0; 
            cursor: pointer; 
            transition: transform 0.3s ease;
        }
        #pictures img:hover { transform: scale(1.02); }

        /* Lightbox Styles */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--overlay-bg);
            justify-content: center;
            align-items: center;
        }

        #lightbox img {
            max-width: 85%;
            max-height: 75%;
            border: 5px solid white;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* NEW: Slideshow Nav Buttons */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
            padding: 20px;
            user-select: none;
            text-decoration: none;
            transition: 0.3s;
        }
        .nav-btn:hover { color: var(--primary-color); }
        .prev { left: 20px; }
        .next { right: 20px; }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }

        form { display: flex; flex-direction: column; gap: 10px; }
        input, textarea, button { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }
        button { background-color: var(--primary-color); color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }
        
        footer { background-color: var(--primary-color); color: white; text-align: center; padding: 20px; margin-top: 20px; }
    </style>
</head>
<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#pictures">Gallery</a>
        <a href="#video">Video</a>
        <a href="#contact">Contact</a>
    </nav>

    <!-- Lightbox Container -->
    <div id="lightbox">
        <span class="close-btn">&times;</span>
        <span class="nav-btn prev">&#10094;</span>
        <img id="lightbox-img" src="" alt="Enlarged view">
        <span class="nav-btn next">&#10095;</span>
    </div>

    <section id="home">
        <h1>Welcome to Ola Shaheen's Page</h1>
        <p>Welcome! I'm Ola. Take a look around my page. Click on the images in the gallery to see the Lightbox effect in action!</p>
    </section>

    <section id="pictures">
        <h2>Picture Gallery</h2>
        <img src="https://picsum.photos/id/1043/800/400" alt="A beautiful landscape view">
        <img src="https://picsum.photos/id/1015/800/400" alt="River in the mountains">
        <img src="https://picsum.photos/id/1039/800/400" alt="A waterfall">
    </section>

    <section id="video">
        <h2>Featured Video</h2>
        <iframe width="100%" height="450" src="https://www.youtube.com/embed/ScMzIvxBSi4" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </section>

    <section id="contact">
        <h2>Contact Ola</h2>
        <form action="#" method="POST">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Ola Shaheen. All rights reserved.</p>
    </footer>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const galleryImages = document.querySelectorAll('#pictures img');
        const prevBtn = document.querySelector('.prev');
        const nextBtn = document.querySelector('.next');
        
        let currentIndex = 0;

        // Open Lightbox and track which image was clicked
        galleryImages.forEach((image, index) => {
            image.addEventListener('click', () => {
                currentIndex = index;
                updateLightbox();
                lightbox.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            });
        });

        // Function to update the image in the lightbox
        function updateLightbox() {
            lightboxImg.src = galleryImages[currentIndex].src;
        }

        // Navigate to next/prev
        function navigate(step) {
            currentIndex += step;
            if (currentIndex >= galleryImages.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = galleryImages.length - 1;
            updateLightbox();
        }

        nextBtn.addEventListener('click', (e) => { e.stopPropagation(); navigate(1); });
        prevBtn.addEventListener('click', (e) => { e.stopPropagation(); navigate(-1); });

        // Close Lightbox
        lightbox.addEventListener('click', (e) => {
            if (e.target !== lightboxImg && e.target !== prevBtn && e.target !== nextBtn) {
                lightbox.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (lightbox.style.display === 'flex') {
                if (e.key === "ArrowRight") navigate(1);
                if (e.key === "ArrowLeft") navigate(-1);
                if (e.key === "Escape") lightbox.click();
            }
        });
    </script>
</body>
</html>
